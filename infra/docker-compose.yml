services:

  db:
    image: pgvector/pgvector:pg15
    container_name: ai_sdlc_db
    environment:
      POSTGRES_USER: ai_sdlc_user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ai_sdlc
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai_sdlc_user -d ai_sdlc"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: ai_sdlc_backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg2://ai_sdlc_user:password@db:5432/ai_sdlc
      APP_ENV: development
      APP_DEBUG: "true"
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      OLLAMA_MODEL: qwen3:8b
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ../backend:/app
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

volumes:
  pgdata:
