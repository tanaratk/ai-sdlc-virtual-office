x-backend-env: &backend-env
  DATABASE_URL: postgresql+psycopg2://ai_sdlc_user:password@db:5432/ai_sdlc
  APP_ENV: development
  APP_DEBUG: "true"
  OLLAMA_BASE_URL: http://host.docker.internal:11434
  OLLAMA_MODEL: qwen3:8b
  REDIS_URL: redis://redis:6379/0
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}

x-backend-volumes: &backend-volumes
  - ../backend:/app
  - D:/workspace:/workspace

services:

  db:
    image: pgvector/pgvector:pg15
    container_name: ai_sdlc_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ai_sdlc_user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ai_sdlc
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai_sdlc_user -d ai_sdlc"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: ai_sdlc_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: ai_sdlc_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      <<: *backend-env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes: *backend-volumes
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  celery_worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: ai_sdlc_celery
    restart: unless-stopped
    environment:
      <<: *backend-env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes: *backend-volumes
    command: >
      celery -A app.worker.celery_app worker
        --loglevel=info
        --concurrency=2
        --pool=threads
        --queues=celery

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: ai_sdlc_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
